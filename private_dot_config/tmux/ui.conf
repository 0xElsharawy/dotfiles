# ===========================================
# Colors (Tokyonight)
# ===========================================
set -g status-bg "#1a1b26"
set -g status-fg "#7aa2fa"

set -g message-style fg="#f7768e",bg="#1a1b26",bold
set -g mode-style fg="#1a1b26",bg="#7aa2fa",bold

# ===========================================
# Status Bar Layout
# ===========================================
set-option -g status-position top
set -g status-justify absolute-centre
set -g status-left-length 100
set -g status-right ""

# ===========================================
# Window Styles
# ===========================================
set -g window-status-format "#[fg=#7aa2f7] #[fg=#c0caf5]#I #[fg=#565f89]#W"
set -g window-status-current-format "#[fg=#1a1b26,bg=#7aa2f7,bold]#I #[underline]#W#[default]"

# ===========================================
# Status Right (scripts)
# ===========================================
set -g status-right "#[fg=#2e2e3e]#[bg=#2e2e3e]#[default]\
#(~/.config/tmux/scripts/time.sh) \
#(~/.config/tmux/scripts/date.sh) \
#(~/.config/tmux/scripts/bat_status.sh)"
